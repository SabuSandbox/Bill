    <style>
        /* Northern Lights Animated Background */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 20px;
            color: #e0e0e0; 
            min-height: 100vh;
            background: linear-gradient(-45deg, #0b1021, #1a0b2e, #0d322d, #091f2c);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .layout-wrapper {
            display: flex;
            gap: 30px;
            max-width: 1400px;
            margin: auto;
            align-items: flex-start;
        }

        /* Glassmorphism Panels */
        .glass-panel { 
            background: rgba(20, 20, 30, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); 
        }

        .left-panel { flex: 1; }
        
        .right-panel { 
            flex: 1; 
            position: sticky; 
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1, h2, h3 { color: #ffffff; font-weight: 600; margin-top: 0; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; margin-bottom: 15px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 13px; color: #a8b2d1; text-transform: uppercase; letter-spacing: 0.5px;}
        
        /* Dark Glass Inputs */
        input[type="text"], input[type="number"], input[type="date"], select { 
            width: 100%; 
            padding: 12px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s ease;
            outline: none;
        }
        
        option { background-color: #1a1a2e; color: #fff; }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00ffcc; 
            box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.2);
        }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; cursor: pointer; }

        .item-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        button { 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            cursor: pointer; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .remove-btn { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border: 1px solid #ff3b30; padding: 12px 15px; }
        .remove-btn:hover { background: #ff3b30; color: #fff; }
        
        .add-btn { 
            background: rgba(0, 255, 204, 0.1); 
            color: #00ffcc; 
            width: 100%; 
            border: 1px dashed #00ffcc; 
            margin-top: 10px;
        }
        .add-btn:hover { background: rgba(0, 255, 204, 0.2); }

        .btn-group { display: flex; gap: 15px; }
        .btn-warning { background: linear-gradient(135deg, #007aff, #005bb5); flex: 1; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4); }
        .btn-warning:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 122, 255, 0.6); }
        .btn-danger { background: linear-gradient(135deg, #ff2d55, #d0183b); flex: 1; box-shadow: 0 4px 15px rgba(255, 45, 85, 0.4); }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 45, 85, 0.6); }

        /* Live Preview Document Style */
        #invoice-output { 
            border-radius: 12px; 
            background: #ffffff; 
            color: #1a1a1a; 
            padding: 30px;
            min-height: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 12px;
            overflow-y: auto;
            max-height: 70vh;
        }

        #invoice-output table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        #invoice-output th, #invoice-output td { border: 1px solid #e0e0e0; padding: 8px; text-align: left; }
        #invoice-output th { background: #f5f5f7; font-weight: 600; color: #555; }
        
        /* Responsive */

            .layout-wrapper { flex-direction: column; }
            .right-panel { position: static; }

    function numberToWords(num) {
        if (num === 0) return "Zero Rupees";
        const a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
        if ((num = num.toString()).length > 9) return 'overflow';
        let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!n) return; let str = '';
        str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
        str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
        str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
        str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
        str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Rupees Only' : 'Rupees Only';
        return str;
    }

    function calculateInvoiceData() {

        const orderId = Math.floor(100000000000 + Math.random() * 900000000000); 

        let itemsData = [];
        let totalGross = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            let selectElement = row.querySelector('.item-select');
            let price = parseFloat(selectElement.value);
            if (isNaN(price)) return; 

            let name = selectElement.options[selectElement.selectedIndex].text.split(' (')[0];
            let qty = parseInt(row.querySelector('.item-qty').value) || 1;
            let amount = price * qty;
            
            totalGross += amount;
            itemsData.push({ item_name: name, qty: qty, unit_price: price.toFixed(2), gross_value: amount.toFixed(2) });
        });

        let discountAmt = totalGross * (discountPct / 100);
        let netValue = totalGross - discountAmt;
        let cgst = netValue * 0.025;
        let sgst = netValue * 0.025;
        let finalTotal = Math.round(netValue + cgst + sgst); 
        let words = numberToWords(finalTotal);

        return { restaurant, legalName, invoiceNo, date, customer, address, state, orderId, itemsData, totalGross, discountAmt, netValue, cgst, sgst, finalTotal, words };
    }

                    <div style="text-align: right;">

                        <strong>HSN Code:</strong> 996331

                <table>
                    <thead>
                        <tr>
                            <th>Particulars</th>
                            <th style="text-align: center;">Qty</th>

                    <h3 style="margin: 10px 0 0 0; padding-top: 10px; border-top: 1px solid #ccc;">Final Total: ₹${data.finalTotal.toFixed(2)}</h3>
                </div>

                <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; font-size: 11px; color: #555;">

    }

    // --- File Downloads ---
    function generatePDF() {
        if(!document.getElementById('restaurant-select').value) {
            alert("Please select a restaurant before downloading.");
            return;
        }
        
        const element = document.getElementById('invoice-output');
        const data = calculateInvoiceData();
        const opt = {
            margin:       0.2,
            filename:     `${data.invoiceNo}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'in', format: 'A4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function loadFile(url, callback) { PizZipUtils.getBinaryContent(url, callback); }

    function generateDocxBill() {
        const data = calculateInvoiceData();
        if(data.restaurant.name === "Pending Selection...") {
            alert("Please select a restaurant before generating the document.");
            return;
        }

        const templateFile = document.getElementById('doc-type').value;

        loadFile(templateFile, function(error, content) {
            if (error) { 
                alert(`Could not load ${templateFile}. Make sure the file exists in the same folder.`);
                throw error; 
            };
            
            var zip = new PizZip(content);
            var doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            doc.render({
                legal_name: data.legalName,
                invoice_no: data.invoiceNo,
                restaurant_name: data.restaurant.name,
                restaurant_address: data.restaurant.address,
                gstin: data.restaurant.gstin,
                fssai: data.restaurant.fssai,
                invoice_date: data.date,
                customer_name: data.customer,
                delivery_address: data.address,
                place_of_supply: data.state,
                items: data.itemsData, 
                total_gross: data.totalGross.toFixed(2),
                discount_amount: data.discountAmt.toFixed(2),
                net_value: data.netValue.toFixed(2),
                cgst_amount: data.cgst.toFixed(2),
                sgst_amount: data.sgst.toFixed(2),
                final_total: data.finalTotal.toFixed(2),
                amount_in_words: data.words,
                order_id: data.orderId
            });

            var out = doc.getZip().generate({
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            });
            saveAs(out, `${data.invoiceNo}.docx`);
        });
    }
</script>
