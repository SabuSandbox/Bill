<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Billing System</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip-utils.js"></script>

    <style>
        /* Dark Theme UI based on uploaded image */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            background-color: #000000;
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .layout-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            background: #0a0a0a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid #1a1a1a;
        }

        /* Left Panel: Emerald Green Gradient Glow */
        .left-panel { 
            flex: 1; 
            background: radial-gradient(circle at 30% 40%, rgba(20, 85, 60, 0.9) 0%, rgba(10, 35, 25, 0.8) 40%, #0a0a0a 80%);
            padding: 50px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .left-panel h1 { font-size: 36px; font-weight: 500; margin-bottom: 10px; letter-spacing: -0.5px; }
        .left-panel p { color: #a0a0a0; font-size: 15px; max-width: 250px; line-height: 1.5; }

        /* Right Panel: Dark Form */
        .right-panel { 
            flex: 1.2; 
            padding: 40px 50px;
            overflow-y: auto;
            background: #000000;
        }

        .right-panel::-webkit-scrollbar { width: 8px; }
        .right-panel::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h2 { font-size: 20px; font-weight: 500; margin-bottom: 5px; }
        .form-header p { color: #777; font-size: 12px; }

        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        
        label { display: block; font-weight: 400; margin-bottom: 6px; font-size: 12px; color: #888; }
        
        /* Dark Inputs */
        input[type="text"], input[type="number"], input[type="date"], select { 
            width: 100%; 
            padding: 14px; 
            background: #111111; 
            border: 1px solid #222222; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 13px;
            color: #eeeeee;
            outline: none;
            transition: border 0.2s;
        }
        
        input::placeholder { color: #555; }
        input:focus, select:focus { border-color: #444; background: #161616; }

        optgroup { font-weight: 600; color: #888; background: #000; }
        option { color: #fff; background: #111; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }

        .item-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        /* Buttons matching the image style */
        button { 
            border: none; 
            padding: 14px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: 500; 
            font-size: 13px;
            transition: opacity 0.2s;
            width: 100%;
        }
        button:hover { opacity: 0.8; }
        
        .remove-btn { background: #1a1a1a; color: #ff453a; border: 1px solid #333; width: auto; padding: 14px 18px;}
        .add-btn { background: transparent; color: #888; border: 1px dashed #333; margin-bottom: 20px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-primary { background: #ffffff; color: #000000; }
        .btn-secondary { background: #111111; color: #ffffff; border: 1px solid #333; }

        @media (max-width: 800px) {
            .layout-wrapper { flex-direction: column; height: auto; }
            .left-panel { padding: 40px 20px; text-align: center; }
            .left-panel p { margin: auto; }
            .right-panel { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="left-panel">
        <h1>Invoice<br>Generator</h1>
        <p>Complete these easy steps to generate, preview, and print your restaurant documents.</p>
    </div>

    <div class="right-panel">
        <div class="form-header">
            <h2>Generate Document</h2>
            <p>Enter your details to create the invoice</p>
        </div>

        <form id="billing-form">
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Select Restaurant</label>
                <select id="restaurant-select">
                    <option value="" disabled selected>Select a Restaurant...</option>
                </select>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Document Type</label>
                    <select id="doc-type">
                        <option value="template.docx">Tax Invoice</option>
                        <option value="receipt_template.docx">Payment Receipt</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Invoice No.</label>
                    <input type="text" id="invoice-no" readonly style="color: #fff; background: #0a0a0a;">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Legal Entity Name</label>
                    <input type="text" id="legal-name" placeholder="eg. John Doe">
                </div>
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" id="invoice-date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customer-name" placeholder="eg. Francisco">
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" id="discount-percent" value="0" min="0" max="100">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" id="delivery-address" placeholder="Enter delivery address">
                </div>
                <div class="form-group">
                    <label>Place of Supply</label>
                    <input type="text" id="place-of-supply" value="Haryana (06)">
                </div>
            </div>

            <div style="margin: 25px 0 10px; border-bottom: 1px solid #222; padding-bottom: 10px;">
                <label style="font-size: 14px; color: #fff;">Order Items</label>
            </div>
            
            <div id="items-container"></div>
            <button type="button" class="add-btn" onclick="addItemRow()">Add Item</button>
            
            <div class="btn-group">
                <button type="button" class="btn-secondary" onclick="openPreview('view')">Preview</button>
                <button type="button" class="btn-secondary" onclick="generateDocxBill()">Download Word</button>
            </div>
            <button type="button" class="btn-primary" style="margin-top: 10px;" onclick="openPreview('print')">Print Document</button>
        </form>
    </div>
</div>

<script>
    // --- 1. Database State ---
    const restaurants = [
        { id: 1, name: "Cyber Hub Social", address: "DLF Cyber Hub, Phase 2, Gurugram", gstin: "06AADCC4946L1ZE", fssai: "10019064001810", legalName: "Rahul Sharma" },
        { id: 2, name: "Farzi Cafe", address: "Ground Floor, Cyber Hub, Gurugram", gstin: "06BBECD4946M2XF", fssai: "10019064002999", legalName: "Priya Desai" },
        { id: 3, name: "Indian Accent", address: "The Lodhi, Lodhi Road, New Delhi", gstin: "07AAACD1234E1Z1", fssai: "10020011003456", legalName: "Vikram Malhotra" },
        { id: 4, name: "Dhaba Estd 1986", address: "Ambience Mall, NH-8, Gurugram", gstin: "06CCBBD9876K1Z2", fssai: "10021064001122", legalName: "Ananya Singh" },
        { id: 5, name: "Comorin", address: "Two Horizon Center, Golf Course Rd, Gurugram", gstin: "06DDCCD5555M1Z3", fssai: "10018064009988", legalName: "Kabir Das" },
        { id: 6, name: "Burma Burma", address: "Tower C, DLF Cyber City, Gurugram", gstin: "06EEFFD7777P1Z4", fssai: "10019011004433", legalName: "Meera Kapoor" },
        { id: 7, name: "The Great Kabab Factory", address: "Radisson Blu, NH-8, Gurugram", gstin: "06GGHHD2222Q1Z5", fssai: "10022011005566", legalName: "Arjun Reddy" },
        { id: 8, name: "Pirates of Grill", address: "MGF Megacity Mall, MG Road, Gurugram", gstin: "06IIJJD8888R1Z6", fssai: "10023011006677", legalName: "Sneha Patel" },
        { id: 9, name: "Striker Pub & Brewery", address: "Sector 29, Gurugram", gstin: "06KKLLD4444S1Z7", fssai: "10024011007788", legalName: "Rohan Verma" },
        { id: 10, name: "Prankster", address: "Sector 29 Market, Gurugram", gstin: "06MMNND6666T1Z8", fssai: "10025064008899", legalName: "Neha Gupta" }
    ];

    // Array Generation for exactly 300 Items (Dense format to save tokens)
    const rawItemsData = [
        // Snacks & Appetizers (50)
        ...Array.from({length: 50}, (_, i) => ["Snacks & Appetizers", `Samosa Variation ${i+1}`, 50 + (i*5)]),
        // North Indian (50)
        ...Array.from({length: 50}, (_, i) => ["North Indian", `Paneer Dish ${i+1}`, 200 + (i*10)]),
        // South Indian (50)
        ...Array.from({length: 50}, (_, i) => ["South Indian", `Dosa Type ${i+1}`, 150 + (i*8)]),
        // Chinese & Asian (50)
        ...Array.from({length: 50}, (_, i) => ["Chinese & Asian", `Noodles/Dimsum ${i+1}`, 250 + (i*12)]),
        // Sweets & Desserts (50)
        ...Array.from({length: 50}, (_, i) => ["Sweets & Desserts", `Indian Sweet ${i+1}`, 100 + (i*6)]),
        // Drinks & Beverages (50)
        ...Array.from({length: 50}, (_, i) => ["Drinks & Beverages", `Mocktail/Drink ${i+1}`, 120 + (i*5)])
    ];
    // Map to final array
    const menuItems = rawItemsData.map((item, index) => ({ id: index + 1, category: item[0], name: item[1], price: item[2] }));

    // Generate Select Options
    let selectDropdownHTML = `<select class="item-select" style="flex: 2;"><option value="" disabled selected>Select an Item...</option>`;
    const categories = [...new Set(menuItems.map(item => item.category))];
    categories.forEach(cat => {
        selectDropdownHTML += `<optgroup label="${cat}">`;
        menuItems.filter(i => i.category === cat).forEach(item => {
            selectDropdownHTML += `<option value="${item.id}">${item.name} (₹${item.price})</option>`;
        });
        selectDropdownHTML += `</optgroup>`;
    });
    selectDropdownHTML += `</select>`;

    // --- 2. Initialization & Auto-Population ---
    window.onload = () => {
        document.getElementById('invoice-no').value = "25MOGSIX" + Math.floor(10000000 + Math.random() * 90000000);

        const restSelect = document.getElementById('restaurant-select');
        restaurants.forEach(r => {
            let option = document.createElement('option');
            option.value = r.id;
            // Append address in brackets
            option.textContent = `${r.name} (${r.address})`;
            restSelect.appendChild(option);
        });
        
        document.getElementById('invoice-date').valueAsDate = new Date();

        restSelect.addEventListener('change', (e) => {
            const selectedRest = restaurants.find(r => r.id === parseInt(e.target.value));
            if(selectedRest) document.getElementById('legal-name').value = selectedRest.legalName;
        });

        // Trigger Auto-Fill Logic
        autoFillInvoice();
    };

    function autoFillInvoice() {
        const container = document.getElementById('items-container');
        container.innerHTML = '';
        let total = 0;
        let selected = [];
        let attempts = 0;

        // Loop until we hit a combination between 4000 and 10000
        while ((total < 4000 || total > 10000) && attempts < 100) {
            total = 0;
            selected = [];
            let count = Math.floor(Math.random() * 6) + 5; // 5 to 10 items
            for (let i = 0; i < count; i++) {
                let item = menuItems[Math.floor(Math.random() * menuItems.length)];
                let qty = Math.floor(Math.random() * 4) + 1; // 1 to 4 quantity
                selected.push({ id: item.id, qty: qty });
                total += item.price * qty;
            }
            attempts++;
        }

        // Render the successful combination
        selected.forEach(s => addItemRow(s.id, s.qty));
    }

    function addItemRow(selectedId = null, defaultQty = 1) {
        const container = document.getElementById('items-container');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            ${selectDropdownHTML}
            <input type="number" class="item-qty" value="${defaultQty}" min="1" style="flex: 0.5;" placeholder="Qty">
            <button type="button" class="remove-btn" title="Remove" onclick="this.parentElement.remove();">✕</button>
        `;
        container.appendChild(row);

        // Pre-select if ID provided
        if(selectedId) {
            row.querySelector('.item-select').value = selectedId;
        }
    }

    function numberToWords(num) {
        if (num === 0) return "Zero Rupees";
        const a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
        if ((num = num.toString()).length > 9) return 'overflow';
        let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!n) return; let str = '';
        str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
        str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
        str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
        str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
        str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Rupees Only' : 'Rupees Only';
        return str;
    }

    function calculateInvoiceData() {
        const restId = parseInt(document.getElementById('restaurant-select').value);
        const restaurant = restaurants.find(r => r.id === restId) || { name: "Pending Selection...", address: "", gstin: "", fssai: "" };
        const legalName = document.getElementById('legal-name').value || 'Pending...';
        const date = document.getElementById('invoice-date').value;
        const customer = document.getElementById('customer-name').value || 'Cash Customer';
        const address = document.getElementById('delivery-address').value || 'N/A';
        const state = document.getElementById('place-of-supply').value || 'N/A';
        const discountPct = parseFloat(document.getElementById('discount-percent').value) || 0;
        const invoiceNo = document.getElementById('invoice-no').value;
        const orderId = Math.floor(100000000000 + Math.random() * 900000000000); 

        let itemsData = [];
        let grandGross = 0, grandDiscount = 0, grandNet = 0, grandCgst = 0, grandSgst = 0, grandTotal = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            let selectElement = row.querySelector('.item-select');
            let itemId = parseInt(selectElement.value);
            if (isNaN(itemId)) return; 

            let item = menuItems.find(i => i.id === itemId);
            let price = item.price;
            let qty = parseInt(row.querySelector('.item-qty').value) || 1;
            
            let gross = price * qty;
            let disc = gross * (discountPct / 100);
            let net = gross - disc;
            let cgst = net * 0.025;
            let sgst = net * 0.025;
            let total = net + cgst + sgst;

            grandGross += gross;
            grandDiscount += disc;
            grandNet += net;
            grandCgst += cgst;
            grandSgst += sgst;
            grandTotal += total;

            itemsData.push({ 
                item_name: item.name, qty: qty, unit_price: price.toFixed(2), gross_value: gross.toFixed(2),
                discount_amount: disc.toFixed(2), net_value: net.toFixed(2), cgst_amount: cgst.toFixed(2),
                sgst_amount: sgst.toFixed(2), total: total.toFixed(2)
            });
        });

        grandTotal = Math.round(grandTotal); 
        let words = numberToWords(grandTotal);

        return { restaurant, legalName, invoiceNo, date, customer, address, state, orderId, itemsData, 
                 grandGross, grandDiscount, grandNet, grandCgst, grandSgst, grandTotal, words };
    }

    // --- 3. Preview & Print Logic (Opens in New Tab) ---
    function openPreview(action) {
        if(!document.getElementById('restaurant-select').value) {
            alert("Please select a restaurant first.");
            return;
        }

        const data = calculateInvoiceData();
        const docTypeName = document.getElementById('doc-type').options[document.getElementById('doc-type').selectedIndex].text;

        let itemsHTML = '';
        data.itemsData.forEach(item => {
            itemsHTML += `
                <tr>
                    <td style="text-align: left;">${item.qty} x ${item.item_name}</td>
                    <td>${item.gross_value}</td>
                    <td>${item.discount_amount}</td>
                    <td>${item.net_value}</td>
                    <td>${item.cgst_amount}</td>
                    <td>${item.sgst_amount}</td>
                    <td><strong>${item.total}</strong></td>
                </tr>`;
        });

        const printHTML = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>${data.invoiceNo} - Preview</title>
                <style>
                    body { font-family: Arial, sans-serif; padding: 40px; color: #111; max-width: 900px; margin: auto; }
                    h2 { text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
                    .header-info { font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
                    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
                    th, td { border: 1px solid #ccc; padding: 8px; text-align: right; }
                    th { background: #f9f9f9; text-align: center; }
                    td:first-child, th:first-child { text-align: left; }
                    .totals { text-align: right; margin-top: 20px; font-size: 14px; }
                    .footer { margin-top: 40px; font-size: 12px; color: #555; border-top: 1px solid #eee; padding-top: 20px;}
                    @media print { body { padding: 0; } }
                </style>
            </head>
            <body>
                <h2>${docTypeName}</h2>
                <div class="header-info">
                    <strong>Legal Entity Name:</strong> ${data.legalName}<br>
                    <strong>Restaurant Name:</strong> ${data.restaurant.name}<br>
                    <strong>Address:</strong> ${data.restaurant.address} | <strong>GSTIN:</strong> ${data.restaurant.gstin}<br>
                    <strong>FSSAI:</strong> ${data.restaurant.fssai}
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 13px; line-height: 1.6;">
                    <div>
                        <strong>Invoice No.:</strong> ${data.invoiceNo}<br>
                        <strong>Date:</strong> ${data.date}<br>
                        <strong>Customer:</strong> ${data.customer}<br>
                        <strong>Delivery:</strong> ${data.address}<br>
                        <strong>POS:</strong> ${data.state}
                    </div>
                    <div style="text-align: right;">
                        <strong>HSN Code:</strong> 996331<br>
                        <strong>Service:</strong> Restaurant Service
                    </div>
                </div>
                <table>
                    <thead>
                        <tr><th>Particulars</th><th>Gross value</th><th>Discount</th><th>Net value</th><th>CGST (2.5%)</th><th>SGST (2.5%)</th><th>Total</th></tr>
                    </thead>
                    <tbody>${itemsHTML}</tbody>
                </table>
                <div class="totals">
                    <h3>Final Total: ₹${data.grandTotal.toFixed(2)}</h3>
                </div>
                <div class="footer">
                    <p><strong>Amount (in words):</strong> ${data.words}</p>
                    <p>Amount of INR ${data.grandTotal.toFixed(2)} settled through digital mode/payment received against Order ID: ${data.orderId} dated ${data.date}</p>
                    <p>Supply attracts reverse charge : No</p>
                </div>
            </body>
            </html>
        `;

        let printWindow = window.open('', '_blank');
        printWindow.document.write(printHTML);
        printWindow.document.close();

        if(action === 'print') {
            printWindow.focus();
            setTimeout(() => { printWindow.print(); }, 500);
        }
    }

    // --- 4. DOCX Download Logic ---
    function loadFile(url, callback) { PizZipUtils.getBinaryContent(url, callback); }

    function generateDocxBill() {
        if(!document.getElementById('restaurant-select').value) {
            alert("Please select a restaurant before generating the document.");
            return;
        }

        const data = calculateInvoiceData();
        const templateFile = document.getElementById('doc-type').value;

        loadFile(templateFile, function(error, content) {
            if (error) { 
                alert(`Could not load ${templateFile}. Make sure the file exists in the same folder.`);
                throw error; 
            };
            
            var zip = new PizZip(content);
            var doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            doc.render({
                legal_name: data.legalName,
                invoice_no: data.invoiceNo,
                restaurant_name: data.restaurant.name,
                restaurant_address: data.restaurant.address,
                gstin: data.restaurant.gstin,
                fssai: data.restaurant.fssai,
                invoice_date: data.date,
                customer_name: data.customer,
                delivery_address: data.address,
                place_of_supply: data.state,
                items: data.itemsData, 
                final_total: data.grandTotal.toFixed(2),
                amount_in_words: data.words,
                order_id: data.orderId
            });

            var out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
            saveAs(out, `${data.invoiceNo}.docx`);
        });
    }
</script>
</body>
</html>
