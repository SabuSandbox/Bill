<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            background-color: #050505; 
            background-image: radial-gradient(circle at 50% 50%, #110a1f 0%, #050505 100%);
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .glow-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            z-index: 1;
        }

        .glow-wrapper::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, #ff007f 0%, #7000ff 40%, transparent 80%);
            border-radius: 18px;
            z-index: -1;
            filter: blur(8px);
            opacity: 0.8;
        }

        .card-content {
            background: #0f0a18; 
            border-radius: 16px;
            padding: 40px 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .form-header { text-align: center; margin-bottom: 35px; }
        .form-header h2 { font-size: 22px; font-weight: 500; margin-bottom: 8px; color: #fff; }
        .form-header p { color: #888; font-size: 13px; margin: 0; }

        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        
        label { display: block; font-weight: 400; margin-bottom: 8px; font-size: 12px; color: #aaa; }
        
        input[type="text"], input[type="number"], input[type="date"], select { 
            width: 100%; 
            padding: 12px 14px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 13px;
            color: #eeeeee;
            outline: none;
            transition: all 0.2s ease;
        }
        
        input::placeholder { color: #555; }
        input:focus, select:focus { border-color: #7000ff; background: rgba(255, 255, 255, 0.06); }

        optgroup { font-weight: 600; color: #888; background: #0f0a18; }
        option { color: #fff; background: #1a1125; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer;}

        .item-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        button { 
            border: none; 
            padding: 14px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: 500; 
            font-size: 14px;
            transition: opacity 0.2s, transform 0.1s;
            width: 100%;

        button:active { transform: scale(0.98); }
        
        .btn-primary { background: #ffffff; color: #000000; margin-top: 15px; font-weight: 600; }
        .btn-primary:hover { background: #e0e0e0; }

        .btn-secondary { background: transparent; color: #cccccc; border: 1px solid rgba(255,255,255,0.15); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); color: #fff;}

        .remove-btn:hover { background: rgba(255, 69, 58, 0.1); }

        .add-btn:hover { border-color: rgba(255,255,255,0.4); color: #bbb;}
        
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 15px; }
            .card-content { padding: 30px 20px; }
        }
    </style>
</head>

<div class="glow-wrapper">
    <div class="card-content">

            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Document Type</label>
                    <select id="doc-type">
                        <option value="template.docx">Tax Invoice</option>
                        <option value="receipt_template.docx">Payment Receipt</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Invoice No.</label>
                    <input type="text" id="invoice-no" readonly style="color: #ff007f; background: rgba(255,0,127,0.05); border-color: rgba(255,0,127,0.2);">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Legal Entity Name</label>
                    <input type="text" id="legal-name" placeholder="eg. John Doe">
                </div>
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" id="invoice-date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customer-name" placeholder="eg. Francisco">
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" id="discount-percent" value="0" min="0" max="100">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" id="delivery-address" placeholder="Enter delivery address">
                </div>
                <div class="form-group">
                    <label>Place of Supply</label>
                    <input type="text" id="place-of-supply" value="Haryana (06)">

            </div>

            <div style="margin: 30px 0 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                <label style="font-size: 14px; color: #fff; margin:0;">Order Items</label>
            </div>
            
            <div id="items-container"></div>
            <button type="button" class="add-btn" onclick="addItemRow()">+ Add Another Item</button>
            
            <div class="btn-group">
                <button type="button" class="btn-secondary" onclick="openPreview('view')">View Preview</button>
                <button type="button" class="btn-secondary" onclick="generateDocxBill()">Download Word Doc</button>
            </div>
            <button type="button" class="btn-primary" onclick="openPreview('print')">Print Document</button>
        </form>
    </div>
</div>

<script>

    function autoFillInvoice() {
        const container = document.getElementById('items-container');
        container.innerHTML = '';
        let total = 0;
        let selected = [];
        let attempts = 0;

        while ((total < 4000 || total > 10000) && attempts < 1000) {
            total = 0;
            selected = [];
            let count = Math.floor(Math.random() * 6) + 5; 
            for (let i = 0; i < count; i++) {
                let item = menuItems[Math.floor(Math.random() * menuItems.length)];
                let qty = Math.floor(Math.random() * 4) + 1; 
                selected.push({ id: item.id, qty: qty });
                total += (item.price * qty);
            }
            attempts++;
        }
        selected.forEach(s => addItemRow(s.id, s.qty));
    }

    function addItemRow(selectedId = null, defaultQty = 1) {
        const container = document.getElementById('items-container');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            ${selectDropdownHTML}
            <input type="number" class="item-qty" value="${defaultQty}" min="1" style="flex: 0.5;" placeholder="Qty">
            <button type="button" class="remove-btn" title="Remove" onclick="this.parentElement.remove();">✕</button>
        `;
        container.appendChild(row);
        if(selectedId) row.querySelector('.item-select').value = selectedId;
    }

    function numberToWords(num) {
        if (num === 0) return "Zero Rupees";
        const a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
        if ((num = num.toString()).length > 9) return 'overflow';
        let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!n) return; let str = '';
        str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
        str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
        str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
        str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
        str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Rupees Only' : 'Rupees Only';
        return str;
    }

    function calculateInvoiceData() {
        const restId = parseInt(document.getElementById('restaurant-select').value);
        const restaurant = restaurants.find(r => r.id === restId) || { name: "_________________", address: "_________________", gstin: "__________", fssai: "__________" };
        const legalName = document.getElementById('legal-name').value || '_________________';
        const date = document.getElementById('invoice-date').value;
        const customer = document.getElementById('customer-name').value || 'Cash Customer';
        const address = document.getElementById('delivery-address').value || 'N/A';
        const state = document.getElementById('place-of-supply').value || 'N/A';
        const discountPct = parseFloat(document.getElementById('discount-percent').value) || 0;
        const invoiceNo = document.getElementById('invoice-no').value;
        const orderId = Math.floor(100000000000 + Math.random() * 900000000000); 

        let itemsData = [];
        let items_gross = 0, items_discount = 0, items_net = 0, items_cgst = 0, items_sgst = 0, items_total = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            let selectElement = row.querySelector('.item-select');
            let itemId = parseInt(selectElement.value);
            if (isNaN(itemId)) return; 

            let item = menuItems.find(i => i.id === itemId);
            let price = item.price;
            let qty = parseInt(row.querySelector('.item-qty').value) || 1;
            
            let gross = price * qty;
            let disc = gross * (discountPct / 100);
            let net = gross - disc;
            let cgst = net * 0.025;
            let sgst = net * 0.025;
            let total = net + cgst + sgst;

            items_gross += gross;
            items_discount += disc;
            items_net += net;
            items_cgst += cgst;
            items_sgst += sgst;
            items_total += total;

            itemsData.push({ 
                item_name: item.name, 
                qty: qty, 
                item_gross: gross.toFixed(2),
                discount_amount: disc.toFixed(2), 
                item_net: net.toFixed(2), 
                item_cgst: cgst.toFixed(2),
                item_sgst: sgst.toFixed(2), 
                item_total: total.toFixed(2)
            });
        });

        const pack_net = 29.19;
        const pack_cgst = 0.73;
        const pack_sgst = 0.73;
        const pack_total = 30.65;

        let total_net = items_net + pack_net;
        let total_cgst = items_cgst + pack_cgst;
        let total_sgst = items_sgst + pack_sgst;
        let total = items_total + pack_total;
        let final_total = Math.round(total); 
        
        let words = numberToWords(final_total);

        return { 
            restaurant, legalName, invoiceNo, date, customer, address, state, orderId, itemsData, 
            items_gross, items_discount, items_net, items_cgst, items_sgst, items_total,
            total_net, total_cgst, total_sgst, total, final_total, words 
        };
    }

                </div>

                <div class="sign-box">
                    Authorized Signatory
                </div>

            </body>
            </html>
        `;

        let printWindow = window.open('', '_blank');
        printWindow.document.write(printHTML);
        printWindow.document.close();

        if(action === 'print') {
            printWindow.focus();
            setTimeout(() => { printWindow.print(); }, 500);
        }
    }

    function loadFile(url, callback) { PizZipUtils.getBinaryContent(url, callback); }

    function generateDocxBill() {
        if(!document.getElementById('restaurant-select').value) {
            alert("Please select a restaurant before generating the document.");
            return;
        }

        const data = calculateInvoiceData();
        const templateFile = document.getElementById('doc-type').value;

        loadFile(templateFile, function(error, content) {
            if (error) { 
                alert(`Could not load ${templateFile}. Make sure the file exists in the same folder.`);
                throw error; 
            };
            
            var zip = new PizZip(content);
            var doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            doc.render({
                legal_name: data.legalName,
                invoice_no: data.invoiceNo,
                restaurant_name: data.restaurant.name,
                restaurant_address: data.restaurant.address,
                gstin: data.restaurant.gstin,
                fssai: data.restaurant.fssai,
                invoice_date: data.date,
                customer_name: data.customer,
                delivery_address: data.address,
                place_of_supply: data.state,
                items: data.itemsData, 
                items_gross: data.items_gross.toFixed(2),
                items_net: data.items_net.toFixed(2),
                items_cgst: data.items_cgst.toFixed(2),
                items_sgst: data.items_sgst.toFixed(2),
                items_total: data.items_total.toFixed(2),
                total_net: data.total_net.toFixed(2),
                total_cgst: data.total_cgst.toFixed(2),
                total_sgst: data.total_sgst.toFixed(2),
                total: data.total.toFixed(2),
                final_total: data.final_total.toFixed(2),
                amount_in_words: data.words,
                order_id: data.orderId
            });

            var out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
            saveAs(out, `${data.invoiceNo}.docx`);
        });
    }
</script>
