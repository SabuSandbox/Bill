        input[type="text"], input[type="number"], input[type="date"], select {

            padding: 12px;

        input:focus, select:focus {

            border-color: #0a84ff; /* Bright iOS Blue */
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.3);

    function numberToWords(num) {
        if (num === 0) return "Zero Rupees";
        const a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
        if ((num = num.toString()).length > 9) return 'overflow';
        let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!n) return; let str = '';
        str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
        str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
        str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
        str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
        str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Rupees Only' : 'Rupees Only';
        return str;
    }

    // --- 4. Calculation Logic ---
    function calculateInvoiceData() {
        const restId = parseInt(document.getElementById('restaurant-select').value);
        const restaurant = restaurants.find(r => r.id === restId) || { name: "N/A", address: "N/A", gstin: "N/A", fssai: "N/A" };
        const date = document.getElementById('invoice-date').value;
        const customer = document.getElementById('customer-name').value || 'Cash Customer';
        const address = document.getElementById('delivery-address').value || 'N/A';
        const state = document.getElementById('place-of-supply').value || 'N/A';
        const discountPct = parseFloat(document.getElementById('discount-percent').value) || 0;
        const orderId = Math.floor(100000000000 + Math.random() * 900000000000); 

        let itemsData = [];
        let totalGross = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            let selectElement = row.querySelector('.item-select');
            let price = parseFloat(selectElement.value);
            if (isNaN(price)) return; 

            let name = selectElement.options[selectElement.selectedIndex].text.split(' (')[0];
            let qty = parseInt(row.querySelector('.item-qty').value) || 1;
            let amount = price * qty;
            
            totalGross += amount;
            itemsData.push({ item_name: name, qty: qty, unit_price: price.toFixed(2), gross_value: amount.toFixed(2) });
        });

        let discountAmt = totalGross * (discountPct / 100);
        let netValue = totalGross - discountAmt;
        let cgst = netValue * 0.025;
        let sgst = netValue * 0.025;
        let finalTotal = Math.round(netValue + cgst + sgst); 
        let words = numberToWords(finalTotal);

        return { restaurant, date, customer, address, state, orderId, itemsData, totalGross, discountAmt, netValue, cgst, sgst, finalTotal, words };
    }

                </div>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 14px; line-height: 1.6; color: #333;">
                    <div>
                        <strong>Billed To:</strong><br>
                        ${data.customer}<br>
                        ${data.address}<br>
                        <strong>POS:</strong> ${data.state}
                    </div>
                    <div style="text-align: right;">
                        <strong>Order ID:</strong> ${data.orderId}<br>
                        <strong>Date:</strong> ${data.date}<br>
                        <strong>HSN Code:</strong> 996331
                    </div>
                </div>

                <table style="width: 100%; border-collapse: collapse; margin-bottom: 25px; font-size: 14px; color: #333;">
                    <thead>
                        <tr style="background-color: #f8f9fa;">
                            <th style="border: 1px solid #ddd; padding: 10px; text-align: left;">Particulars</th>
                            <th style="border: 1px solid #ddd; padding: 10px;">Qty</th>
                            <th style="border: 1px solid #ddd; padding: 10px; text-align: right;">Price</th>
                            <th style="border: 1px solid #ddd; padding: 10px; text-align: right;">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHTML}
                    </tbody>
                </table>

                <div style="text-align: right; font-size: 14px; line-height: 1.8; color: #333;">
                    <div>Gross Value: <strong>₹${data.totalGross.toFixed(2)}</strong></div>
                    <div>Discount (${document.getElementById('discount-percent').value}%): <strong>-₹${data.discountAmt.toFixed(2)}</strong></div>
                    <div>Net Value: <strong>₹${data.netValue.toFixed(2)}</strong></div>
                    <div>CGST (2.5%): <strong>₹${data.cgst.toFixed(2)}</strong></div>
                    <div>SGST (2.5%): <strong>₹${data.sgst.toFixed(2)}</strong></div>
                    <h3 style="margin: 15px 0 0 0; font-size: 20px; border-top: 1px solid #ddd; padding-top: 10px; color: #333;">Final Total: ₹${data.finalTotal.toFixed(2)}</h3>
                </div>

                <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; font-size: 13px; color: #555;">
                    <p><strong>Amount in words:</strong> ${data.words}</p>
                    <p>Supply attracts reverse charge: No.</p>
                </div>
            </div>
        `;
        return true;
    }

    // --- 6. PDF Generation Logic ---
    function generatePDF() {
        if(!generatePreview()) return;

        const element = document.getElementById('invoice-output');
        const data = calculateInvoiceData();
        const filePrefix = document.getElementById('doc-type').value === "receipt_template.docx" ? "Receipt" : "Invoice";
        
        const opt = {
            margin:       0,
            filename:     `${filePrefix}_${data.orderId}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'in', format: 'A4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }

    // --- 7. Word Document Generation Logic ---
    function loadFile(url, callback) {
        PizZipUtils.getBinaryContent(url, callback);
    }

    function generateDocxBill() {
        const data = calculateInvoiceData();
        if(data.restaurant.name === "N/A") {
            alert("Please select a restaurant before generating the document.");
            return;
        }

        const templateFile = document.getElementById('doc-type').value;
        const filePrefix = templateFile === "receipt_template.docx" ? "Receipt" : "Invoice";

        loadFile(templateFile, function(error, content) {
            if (error) { 
                alert(`Could not load ${templateFile}. Make sure the file exists in the same folder.`);
                throw error; 
            };
            
            var zip = new PizZip(content);
            var doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            doc.render({
                restaurant_name: data.restaurant.name,
                restaurant_address: data.restaurant.address,
                gstin: data.restaurant.gstin,
                fssai: data.restaurant.fssai,
                invoice_date: data.date,
                customer_name: data.customer,
                delivery_address: data.address,
                place_of_supply: data.state,
                items: data.itemsData, 
                total_gross: data.totalGross.toFixed(2),
                discount_amount: data.discountAmt.toFixed(2),
                net_value: data.netValue.toFixed(2),
                cgst_amount: data.cgst.toFixed(2),
                sgst_amount: data.sgst.toFixed(2),
                final_total: data.finalTotal.toFixed(2),
                amount_in_words: data.words,
                order_id: data.orderId
            });

            var out = doc.getZip().generate({
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            });
            
            saveAs(out, `${filePrefix}_${data.orderId}.docx`);
        });
    }
</script>
