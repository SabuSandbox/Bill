<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Billing System</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip-utils.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="date"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .item-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .remove-btn { background-color: #e74c3c; }
        .remove-btn:hover { background-color: #c0392b; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-success { background-color: #27ae60; flex: 1; font-size: 16px;}
        .btn-success:hover { background-color: #219653; }
        .btn-warning { background-color: #f39c12; flex: 1; font-size: 16px;}
        .btn-warning:hover { background-color: #d68910; }
        #invoice-output { margin-top: 30px; padding: 20px; border: 1px dashed #7f8c8d; background-color: #fafafa; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .totals { margin-top: 15px; text-align: right; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bill Generator</h1>
    
    <div class="form-group">
        <label>Select Restaurant</label>
        <select id="restaurant-select"></select>
    </div>
    
    <div class="form-group">
        <label>Invoice Date</label>
        <input type="date" id="invoice-date" required>
    </div>

    <div class="form-group">
        <label>Customer Name</label>
        <input type="text" id="customer-name" placeholder="Enter customer name">
    </div>

    <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" id="delivery-address" placeholder="Enter delivery address">
    </div>

    <div class="form-group">
        <label>State Name & Place of Supply</label>
        <input type="text" id="place-of-supply" placeholder="e.g., Haryana">
    </div>

    <div class="form-group">
        <label>Discount (%)</label>
        <input type="number" id="discount-percent" value="0" min="0" max="100">
    </div>

    <h3>Items</h3>
    <div id="items-container"></div>
    <button type="button" onclick="addItemRow()">+ Add Item</button>

    <hr style="margin: 20px 0;">
    
    <div class="btn-group">
        <button type="button" class="btn-success" onclick="generatePreview()">Preview Invoice</button>
        <button type="button" class="btn-warning" onclick="generateDocxBill()">Download Word Doc</button>
    </div>

    <div id="invoice-output"></div>
</div>

<script>
    // --- 1. Database State ---
    const restaurants = [
        { id: 1, name: "Downtown Bistro", address: "123 Main St, Sector 29", gstin: "06AADCD4946L1ZE", fssai: "10019064001810" },
        { id: 2, name: "Uptown Cafe", address: "456 High Road, Cyber Hub", gstin: "06BBECD4946M2XF", fssai: "10019064002999" }
    ];

    const menuItems = [
        { id: 1, name: "Paneer Butter Masala", price: 320 },
        { id: 2, name: "Garlic Naan", price: 60 },
        { id: 3, name: "Dal Makhani", price: 280 },
        { id: 4, name: "Jeera Rice", price: 150 },
        { id: 5, name: "Tandoori Roti", price: 30 },
        { id: 6, name: "Chicken Tikka", price: 350 },
        { id: 7, name: "Vegetable Biryani", price: 250 },
        { id: 8, name: "Raita", price: 90 },
        { id: 9, name: "Gulab Jamun (2 pcs)", price: 100 },
        { id: 10, name: "Masala Chai", price: 50 }
    ];

    // --- 2. Initialization ---
    window.onload = () => {
        const restSelect = document.getElementById('restaurant-select');
        restaurants.forEach(r => {
            let option = document.createElement('option');
            option.value = r.id;
            option.textContent = r.name;
            restSelect.appendChild(option);
        });
        document.getElementById('invoice-date').valueAsDate = new Date();
        addItemRow(); 
    };

    // --- 3. Dynamic UI Logic ---
    function addItemRow() {
        const container = document.getElementById('items-container');
        const row = document.createElement('div');
        row.className = 'item-row';
        
        let selectHTML = `<select class="item-select" style="flex: 2;">`;
        menuItems.forEach(item => {
            selectHTML += `<option value="${item.price}">${item.name} (₹${item.price})</option>`;
        });
        selectHTML += `</select>`;

        row.innerHTML = `
            ${selectHTML}
            <input type="number" class="item-qty" value="1" min="1" style="flex: 1;" placeholder="Qty">
            <button class="remove-btn" onclick="this.parentElement.remove()">X</button>
        `;
        container.appendChild(row);
    }

    function numberToWords(num) {
        if (num === 0) return "Zero Rupees";
        const a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
        
        if ((num = num.toString()).length > 9) return 'overflow';
        let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!n) return; let str = '';
        str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
        str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
        str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
        str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
        str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Rupees Only' : 'Rupees Only';
        return str;
    }

    // --- 4. Calculation Logic ---
    function calculateInvoiceData() {
        const restId = parseInt(document.getElementById('restaurant-select').value);
        const restaurant = restaurants.find(r => r.id === restId);
        const date = document.getElementById('invoice-date').value;
        const customer = document.getElementById('customer-name').value || 'Cash Customer';
        const address = document.getElementById('delivery-address').value || 'N/A';
        const state = document.getElementById('place-of-supply').value || 'N/A';
        const discountPct = parseFloat(document.getElementById('discount-percent').value) || 0;
        const orderId = Math.floor(100000000000 + Math.random() * 900000000000); 

        let itemsData = [];
        let totalGross = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            let selectElement = row.querySelector('.item-select');
            let price = parseFloat(selectElement.value);
            let name = selectElement.options[selectElement.selectedIndex].text.split(' (')[0];
            let qty = parseInt(row.querySelector('.item-qty').value) || 1;
            let amount = price * qty;
            
            totalGross += amount;
            itemsData.push({ item_name: name, qty: qty, unit_price: price.toFixed(2), gross_value: amount.toFixed(2) });
        });

        let discountAmt = totalGross * (discountPct / 100);
        let netValue = totalGross - discountAmt;
        let cgst = netValue * 0.025;
        let sgst = netValue * 0.025;
        let finalTotal = Math.round(netValue + cgst + sgst); 
        let words = numberToWords(finalTotal);

        return { restaurant, date, customer, address, state, orderId, itemsData, totalGross, discountAmt, netValue, cgst, sgst, finalTotal, words };
    }

    // --- 5. Screen Preview ---
    function generatePreview() {
        const data = calculateInvoiceData();
        let itemsHTML = '';
        data.itemsData.forEach(item => {
            itemsHTML += `<tr><td>${item.item_name}</td><td>${item.qty}</td><td>₹${item.unit_price}</td><td>₹${item.gross_value}</td></tr>`;
        });

        const out = document.getElementById('invoice-output');
        out.style.display = 'block';
        out.innerHTML = `
            <h3>Preview Generated</h3>
            <p><strong>Customer:</strong> ${data.customer} | <strong>Order:</strong> ${data.orderId}</p>
            <table>
                <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
                <tbody>${itemsHTML}</tbody>
            </table>
            <div class="totals">
                <strong>Final Total: ₹${data.finalTotal.toFixed(2)}</strong>
            </div>
        `;
    }

    // --- 6. Word Document Generation Logic ---
    function loadFile(url, callback) {
        PizZipUtils.getBinaryContent(url, callback);
    }

    function generateDocxBill() {
        const data = calculateInvoiceData();

        loadFile("template.docx", function(error, content) {
            if (error) { 
                alert("Could not load template.docx. Make sure the file is in the same folder.");
                throw error; 
            };
            
            var zip = new PizZip(content);
            var doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            // Map the calculated data directly to the tags in the Word doc
            doc.render({
                restaurant_name: data.restaurant.name,
                restaurant_address: data.restaurant.address,
                gstin: data.restaurant.gstin,
                fssai: data.restaurant.fssai,
                invoice_date: data.date,
                customer_name: data.customer,
                delivery_address: data.address,
                place_of_supply: data.state,
                items: data.itemsData, 
                total_gross: data.totalGross.toFixed(2),
                discount_amount: data.discountAmt.toFixed(2),
                net_value: data.netValue.toFixed(2),
                cgst_amount: data.cgst.toFixed(2),
                sgst_amount: data.sgst.toFixed(2),
                final_total: data.finalTotal.toFixed(2),
                amount_in_words: data.words,
                order_id: data.orderId
            });

            var out = doc.getZip().generate({
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            });
            saveAs(out, `Invoice_${data.orderId}.docx`);
        });
    }
</script>
</body>
</html>
