<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Billing System</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip-utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* Bright Glassmorphism Theme */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 20px;
            color: #333; 
            min-height: 100vh;
            /* Bright, vibrant pastel gradient */
            background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            background-attachment: fixed;
        }
        
        .layout-wrapper {
            display: flex;
            gap: 30px;
            max-width: 1500px;
            margin: auto;
            align-items: flex-start;
        }

        /* Light Frosted Glass Panels */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 10px 30px rgba(31, 38, 135, 0.15); 
        }

        .left-panel { flex: 0 0 450px; }
        
        .right-panel { 
            flex: 1; 
            position: sticky; 
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1, h2, h3 { color: #1a1a1a; font-weight: 700; margin-top: 0; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: #444; text-transform: uppercase; letter-spacing: 0.5px;}
        
        /* Bright Glass Inputs */
        input[type="text"], input[type="number"], input[type="date"], select { 
            width: 100%; 
            padding: 12px; 
            background: rgba(255, 255, 255, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 14px;
            color: #333;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #007aff; 
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
        }

        /* Optgroup styling for dropdowns */
        optgroup { font-weight: bold; color: #007aff; background: #fff;}
        option { color: #333; font-weight: normal; }

        .item-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        button { 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            cursor: pointer; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .remove-btn { background: rgba(255, 59, 48, 0.8); padding: 12px 15px; }
        .remove-btn:hover { background: #ff3b30; }
        
        .add-btn { 
            background: rgba(0, 122, 255, 0.1); 
            color: #007aff; 
            width: 100%; 
            border: 2px dashed #007aff; 
            margin-top: 10px;
        }
        .add-btn:hover { background: rgba(0, 122, 255, 0.2); }

        .btn-group { display: flex; gap: 15px; }
        .btn-warning { background: linear-gradient(135deg, #007aff, #005bb5); flex: 1; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }
        .btn-warning:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 122, 255, 0.5); }
        .btn-danger { background: linear-gradient(135deg, #ff2d55, #d0183b); flex: 1; box-shadow: 0 4px 15px rgba(255, 45, 85, 0.3); }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 45, 85, 0.5); }

        /* Unified Document Preview Style (Matches DOCX exactly) */
        #invoice-output { 
            border-radius: 12px; 
            background: #ffffff; 
            color: #1a1a1a; 
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-size: 11px;
            overflow-y: auto;
            max-height: 80vh;
        }

        #invoice-output table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 10px; }
        #invoice-output th, #invoice-output td { border: 1px solid #ccc; padding: 6px; text-align: right; }
        #invoice-output th { background: #f5f5f7; font-weight: 600; text-align: center; }
        #invoice-output td:first-child, #invoice-output th:first-child { text-align: left; }
        
        @media (max-width: 1000px) {
            .layout-wrapper { flex-direction: column; }
            .left-panel { flex: none; width: 100%; box-sizing: border-box; }
            .right-panel { position: static; }
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="glass-panel left-panel">
        <h1>Billing System</h1>
        <form id="billing-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Document Type</label>
                    <select id="doc-type">
                        <option value="template.docx">Tax Invoice</option>
                        <option value="receipt_template.docx">Payment Receipt</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Invoice No.</label>
                    <input type="text" id="invoice-no" readonly style="color: #007aff; font-weight: bold; background: rgba(255,255,255,0.8);">
                </div>
            </div>

            <div class="form-group">
                <label>Select Restaurant</label>
                <select id="restaurant-select">
                    <option value="" disabled selected>Select a Restaurant...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Legal Entity Name</label>
                <input type="text" id="legal-name" placeholder="Owner/Entity Name">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" id="invoice-date" required>
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" id="discount-percent" value="0" min="0" max="100">
                </div>
            </div>

            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="customer-name" placeholder="Enter customer name">
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <input type="text" id="delivery-address" placeholder="Enter delivery address">
            </div>

            <div class="form-group">
                <label>Place of Supply</label>
                <input type="text" id="place-of-supply" value="Haryana (06)">
            </div>

            <h3 style="margin-top: 20px; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 10px;">Order Items</h3>
            <div id="items-container"></div>
            <button type="button" class="add-btn" onclick="addItemRow()">+ Add Another Item</button>
        </form>
    </div>

    <div class="right-panel">
        <div class="glass-panel" style="padding: 20px;">
            <div class="btn-group">
                <button type="button" class="btn-warning" onclick="generateDocxBill()">Download DOCX</button>
                <button type="button" class="btn-danger" onclick="generatePDF()">Download PDF</button>
            </div>
        </div>
        
        <div id="invoice-output">
            <div style="text-align: center; color: #888; margin-top: 200px; font-size: 16px;">
                Fill out the form to see the live document preview.
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. Database State with Categories & Random Names ---
    const restaurants = [
        { id: 1, name: "Cyber Hub Social", address: "DLF Cyber Hub, Phase 2, Gurugram", gstin: "06AADCC4946L1ZE", fssai: "10019064001810", legalName: "Rahul Sharma" },
        { id: 2, name: "Farzi Cafe", address: "Ground Floor, Cyber Hub, Gurugram", gstin: "06BBECD4946M2XF", fssai: "10019064002999", legalName: "Priya Desai" },
        { id: 3, name: "Indian Accent", address: "The Lodhi, Lodhi Road, New Delhi", gstin: "07AAACD1234E1Z1", fssai: "10020011003456", legalName: "Vikram Malhotra" },
        { id: 4, name: "Dhaba Estd 1986", address: "Ambience Mall, NH-8, Gurugram", gstin: "06CCBBD9876K1Z2", fssai: "10021064001122", legalName: "Ananya Singh" },
        { id: 5, name: "Comorin", address: "Two Horizon Center, Golf Course Rd, Gurugram", gstin: "06DDCCD5555M1Z3", fssai: "10018064009988", legalName: "Kabir Das" },
        { id: 6, name: "Burma Burma", address: "Tower C, DLF Cyber City, Gurugram", gstin: "06EEFFD7777P1Z4", fssai: "10019011004433", legalName: "Meera Kapoor" },
        { id: 7, name: "The Great Kabab Factory", address: "Radisson Blu, NH-8, Gurugram", gstin: "06GGHHD2222Q1Z5", fssai: "10022011005566", legalName: "Arjun Reddy" },
        { id: 8, name: "Pirates of Grill", address: "MGF Megacity Mall, MG Road, Gurugram", gstin: "06IIJJD8888R1Z6", fssai: "10023011006677", legalName: "Sneha Patel" },
        { id: 9, name: "Striker Pub & Brewery", address: "Sector 29, Gurugram", gstin: "06KKLLD4444S1Z7", fssai: "10024011007788", legalName: "Rohan Verma" },
        { id: 10, name: "Prankster", address: "Sector 29 Market, Gurugram", gstin: "06MMNND6666T1Z8", fssai: "10025064008899", legalName: "Neha Gupta" }
        // Note: I truncated the list to 10 for code brevity, you can add all 27 back with legalNames!
    ];

    const menuItems = [
        // Starters & Snacks
        { id: 1, name: "Edamame with Sea Salt", price: 450, category: "Starters & Snacks" },
        { id: 2, name: "Truffle Parmesan Fries", price: 650, category: "Starters & Snacks" },
        { id: 7, name: "Punjabi Samosa (2 pcs)", price: 150, category: "Starters & Snacks" },
        { id: 12, name: "24K Gold Vark Paneer Tikka", price: 1850, category: "Starters & Snacks" },
        { id: 17, name: "Tandoori Chicken (Half)", price: 850, category: "Starters & Snacks" },
        // Main Course (Veg)
        { id: 25, name: "Dal Makhani", price: 550, category: "Main Course (Veg)" },
        { id: 28, name: "Paneer Butter Masala", price: 650, category: "Main Course (Veg)" },
        // Main Course (Non-Veg)
        { id: 38, name: "Butter Chicken", price: 850, category: "Main Course (Non-Veg)" },
        { id: 42, name: "Mutton Rogan Josh", price: 1150, category: "Main Course (Non-Veg)" },
        // Breads & Rice
        { id: 50, name: "Garlic Naan", price: 150, category: "Breads & Rice" },
        { id: 61, name: "Vegetable Biryani", price: 650, category: "Breads & Rice" },
        // South Indian
        { id: 66, name: "Masala Dosa", price: 350, category: "South Indian" },
        // Pan-Asian & Chinese
        { id: 74, name: "Hakka Noodles (Veg)", price: 450, category: "Pan-Asian & Chinese" },
        // Continental & Italian
        { id: 84, name: "Margherita Pizza", price: 650, category: "Continental & Italian" },
        // Desserts & Beverages
        { id: 92, name: "Gulab Jamun (2 pcs)", price: 250, category: "Desserts" },
        { id: 98, name: "Masala Chai", price: 150, category: "Beverages" }
        // Note: Paste your full 100 items here and assign them a 'category' key!
    ];

    // --- 2. Initialization & Dropdown Building ---
    let selectDropdownHTML = `<select class="item-select" style="flex: 2;"><option value="" disabled selected>Select an Item...</option>`;
    
    // Group menu items by category automatically
    const categories = [...new Set(menuItems.map(item => item.category))];
    categories.forEach(cat => {
        selectDropdownHTML += `<optgroup label="${cat}">`;
        menuItems.filter(i => i.category === cat).forEach(item => {
            // Using ID as value to fetch full item data easily later
            selectDropdownHTML += `<option value="${item.id}">${item.name} (₹${item.price})</option>`;
        });
        selectDropdownHTML += `</optgroup>`;
    });
    selectDropdownHTML += `</select>`;

    window.onload = () => {
        document.getElementById('invoice-no').value = "25MOGSIX" + Math.floor(10000000 + Math.random() * 90000000);

        const restSelect = document.getElementById('restaurant-select');
        restaurants.forEach(r => {
            let option = document.createElement('option');
            option.value = r.id;
            option.textContent = r.name;
            restSelect.appendChild(option);
        });
        document.getElementById('invoice-date').valueAsDate = new Date();
        addItemRow(); 

        // Auto-fill Legal Entity Name when restaurant changes
        document.getElementById('restaurant-select').addEventListener('change', (e) => {
            const selectedRest = restaurants.find(r => r.id === parseInt(e.target.value));
            if(selectedRest) document.getElementById('legal-name').value = selectedRest.legalName;
            generatePreview();
        });

        // Bind Live Preview Events
        document.getElementById('billing-form').addEventListener('input', generatePreview);
    };

    function addItemRow() {
        const container = document.getElementById('items-container');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            ${selectDropdownHTML}
            <input type="number" class="item-qty" value="1" min="1" style="flex: 1;" placeholder="Qty">
            <button type="button" class="remove-btn" onclick="this.parentElement.remove(); generatePreview();">X</button>
        `;
        container.appendChild(row);
        generatePreview();
    }

    function numberToWords(num) {
        if (num === 0) return "Zero Rupees";
        const a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
        if ((num = num.toString()).length > 9) return 'overflow';
        let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!n) return; let str = '';
        str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
        str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
        str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
        str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
        str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Rupees Only' : 'Rupees Only';
        return str;
    }

    // --- 3. Per-Line Item Calculation Engine ---
    function calculateInvoiceData() {
        const restId = parseInt(document.getElementById('restaurant-select').value);
        const restaurant = restaurants.find(r => r.id === restId) || { name: "Pending Selection...", address: "", gstin: "", fssai: "" };
        const legalName = document.getElementById('legal-name').value || 'Pending...';
        const date = document.getElementById('invoice-date').value;
        const customer = document.getElementById('customer-name').value || 'Cash Customer';
        const address = document.getElementById('delivery-address').value || 'N/A';
        const state = document.getElementById('place-of-supply').value || 'N/A';
        const discountPct = parseFloat(document.getElementById('discount-percent').value) || 0;
        const invoiceNo = document.getElementById('invoice-no').value;
        const orderId = Math.floor(100000000000 + Math.random() * 900000000000); 

        let itemsData = [];
        let grandGross = 0, grandDiscount = 0, grandNet = 0, grandCgst = 0, grandSgst = 0, grandTotal = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            let selectElement = row.querySelector('.item-select');
            let itemId = parseInt(selectElement.value);
            if (isNaN(itemId)) return; 

            // Fetch the item details
            let item = menuItems.find(i => i.id === itemId);
            let price = item.price;
            let qty = parseInt(row.querySelector('.item-qty').value) || 1;
            
            // INDEPENDENT LINE ITEM MATH
            let gross = price * qty;
            let disc = gross * (discountPct / 100);
            let net = gross - disc;
            let cgst = net * 0.025;
            let sgst = net * 0.025;
            let total = net + cgst + sgst;

            // Roll up to grand totals
            grandGross += gross;
            grandDiscount += disc;
            grandNet += net;
            grandCgst += cgst;
            grandSgst += sgst;
            grandTotal += total;

            itemsData.push({ 
                item_name: item.name, 
                qty: qty, 
                unit_price: price.toFixed(2), 
                gross_value: gross.toFixed(2),
                discount_amount: disc.toFixed(2),
                net_value: net.toFixed(2),
                cgst_amount: cgst.toFixed(2),
                sgst_amount: sgst.toFixed(2),
                total: total.toFixed(2)
            });
        });

        grandTotal = Math.round(grandTotal); 
        let words = numberToWords(grandTotal);

        return { restaurant, legalName, invoiceNo, date, customer, address, state, orderId, itemsData, 
                 grandGross, grandDiscount, grandNet, grandCgst, grandSgst, grandTotal, words };
    }

    // --- 4. Live Preview (Matches DOCX Layout) ---
    function generatePreview() {
        const data = calculateInvoiceData();
        const docTypeName = document.getElementById('doc-type').options[document.getElementById('doc-type').selectedIndex].text;

        let itemsHTML = '';
        if (data.itemsData.length === 0) {
            itemsHTML = `<tr><td colspan="7" style="text-align: center; color: #888;">No items selected yet.</td></tr>`;
        } else {
            data.itemsData.forEach(item => {
                itemsHTML += `
                    <tr>
                        <td style="text-align: left;">${item.qty} x ${item.item_name}</td>
                        <td>${item.gross_value}</td>
                        <td>${item.discount_amount}</td>
                        <td>${item.net_value}</td>
                        <td>${item.cgst_amount}</td>
                        <td>${item.sgst_amount}</td>
                        <td><strong>${item.total}</strong></td>
                    </tr>`;
            });
        }

        const out = document.getElementById('invoice-output');
        out.innerHTML = `
            <div style="font-family: Arial, sans-serif;">
                
                <h2 style="margin: 0 0 10px 0; font-size: 18px;">${docTypeName}</h2>
                <div style="font-size: 11px; margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px;">
                    <strong>Legal Entity Name:</strong> ${data.legalName}<br>
                    <strong>Restaurant Name:</strong> ${data.restaurant.name}<br>
                    <strong>Restaurant Address:</strong> ${data.restaurant.address} <strong>GSTIN:</strong> ${data.restaurant.gstin}<br>
                    <strong>Restaurant FSSAI:</strong> ${data.restaurant.fssai}
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 11px;">
                    <div>
                        <strong>Invoice No.:</strong> ${data.invoiceNo}<br>
                        <strong>Invoice Date:</strong> ${data.date}<br>
                        <strong>Customer Name:</strong> ${data.customer}<br>
                        <strong>Delivery Address:</strong> ${data.address}<br>
                        <strong>State name & Place of Supply:</strong> ${data.state}
                    </div>
                    <div style="text-align: right;">
                        <strong>HSN Code:</strong> 996331<br>
                        <strong>Service Description:</strong> Restaurant Service
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Particulars</th>
                            <th>Gross value</th>
                            <th>Discount</th>
                            <th>Net value</th>
                            <th>CGST (2.5%)</th>
                            <th>SGST (2.5%)</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>${itemsHTML}</tbody>
                </table>

                <div style="text-align: right; margin-top: 10px;">
                    <h3 style="margin: 0; font-size: 16px;">Final Total: ₹${data.grandTotal.toFixed(2)}</h3>
                </div>

                <div style="margin-top: 20px; font-size: 11px;">
                    <p><strong>Amount (in words):</strong> ${data.words}</p>
                    <p>Amount of INR ${data.grandTotal.toFixed(2)} settled through digital mode/payment received against Order ID: ${data.orderId} dated ${data.date}</p>
                    <p>Supply attracts reverse charge : No</p>
                </div>
            </div>
        `;
        return true;
    }

    // --- 5. File Downloads ---
    function generatePDF() {
        if(!document.getElementById('restaurant-select').value) {
            alert("Please select a restaurant before downloading.");
            return;
        }
        
        const element = document.getElementById('invoice-output');
        const data = calculateInvoiceData();
        const opt = {
            margin:       0.3,
            filename:     `${data.invoiceNo}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'in', format: 'A4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function loadFile(url, callback) { PizZipUtils.getBinaryContent(url, callback); }

    function generateDocxBill() {
        const data = calculateInvoiceData();
        if(data.restaurant.name === "Pending Selection...") {
            alert("Please select a restaurant before generating the document.");
            return;
        }

        const templateFile = document.getElementById('doc-type').value;

        loadFile(templateFile, function(error, content) {
            if (error) { 
                alert(`Could not load ${templateFile}. Make sure the file exists in the same folder.`);
                throw error; 
            };
            
            var zip = new PizZip(content);
            var doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            doc.render({
                legal_name: data.legalName,
                invoice_no: data.invoiceNo,
                restaurant_name: data.restaurant.name,
                restaurant_address: data.restaurant.address,
                gstin: data.restaurant.gstin,
                fssai: data.restaurant.fssai,
                invoice_date: data.date,
                customer_name: data.customer,
                delivery_address: data.address,
                place_of_supply: data.state,
                items: data.itemsData, 
                final_total: data.grandTotal.toFixed(2),
                amount_in_words: data.words,
                order_id: data.orderId
            });

            var out = doc.getZip().generate({
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            });
            saveAs(out, `${data.invoiceNo}.docx`);
        });
    }
</script>
</body>
</html>
